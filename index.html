<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地震・津波情報</title>
<style>
body{font-family:sans-serif;margin:0;padding:10px;background:#f4f4f4}
.block{background:white;padding:12px;margin-bottom:15px;border-radius:8px}
hr{border:none;border-top:2px solid #000;margin:10px 0}
button{margin-top:8px;padding:6px 12px}
details{margin-top:10px}
.purple{color:#800080;font-weight:bold}
.red{color:red;font-weight:bold}
.yellow{color:#c9a400;font-weight:bold}
.blue{color:#0066cc;font-weight:bold}
</style>
</head>
<body>

<div class="block">
<hr>
<h3>緊急地震速報（警報）</h3>
<div id="eew_warning">発表されていません。</div>
<details>
<summary>▼ 詳細</summary>
<div id="eew_detail"></div>
</details>
<button onclick="copyText('eew_warning')">コピー</button>
<hr>
</div>

<div class="block">
<hr>
<h3>緊急地震速報（予報）</h3>
<div id="eew_forecast">発表されていません。</div>
<button onclick="copyText('eew_forecast')">コピー</button>
<hr>
</div>

<div class="block">
<hr>
<h3>地震情報</h3>
<div id="quake_info">取得中...</div>
<button onclick="copyText('quake_info')">コピー</button>
<hr>
</div>

<div class="block">
<hr>
<h3>津波情報</h3>
<div id="tsunami_info">発表されていません。</div>
<button onclick="copyText('tsunami_info')">コピー</button>
<hr>
</div>

<script>

async function loadQuake(){
 try{
  const res=await fetch("https://www.jma.go.jp/bosai/quake/data/list.json");
  const data=await res.json();
  if(data.length>0){
    const q=data[0];
    document.getElementById("quake_info").innerText=
`【地震情報】
${q.time}
震源地：${q.anm}
最大震度：${q.maxi}
規模：M${q.mag}
深さ：${q.dep}km
気象庁┃${q.time}発表`;
  }
 }catch{
  document.getElementById("quake_info").innerText="取得に失敗しました。";
 }
}

function copyText(id){
 const text=document.getElementById(id).innerText;
 navigator.clipboard.writeText(text);
 alert("コピーしました");
}

loadQuake();
setInterval(loadQuake,60000);

</script>
</body>
</html>
