<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防災速報</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
padding:12px;
}

.header{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.box{
background:#222;
padding:15px;
border-radius:12px;
margin-bottom:15px;
white-space:pre-line;
line-height:1.5;
}

button{
width:100%;
padding:12px;
font-size:16px;
border:none;
border-radius:8px;
background:#444;
color:white;
}
</style>
</head>

<body>

<div class="header">◤ 防災速報 ◢</div>

次回更新：<span id="timer">30</span>秒<br>
最終更新：<span id="update_time">未更新</span>

<div class="box" id="eew_box">
緊急地震速報：発表されていません
</div>

<div class="box" id="quake_box">
地震情報取得中...
</div>

<div class="box" id="tsunami_box">
津波情報：現在発表されていません
</div>

<button onclick="copyText()">📋 コピー</button>

<script>

let countdown=30;
let latestText="";

/* P2P補助取得 */
async function getP2P(){

try{

const res=await fetch(
"https://api.p2pquake.net/v2/history?limit=1"
);

const data=await res.json();

if(!data.length) return {};

return data[0];

}catch{
return {};
}

}

function formatTime(t){

if(!t) return "";

const d=new Date(t);

return `${d.getMonth()+1}月${d.getDate()}日 ${d.getHours()}時${d.getMinutes().toString().padStart(2,"0")}分頃`;
}

async function loadData(){

try{

/* 気象庁 */
const res=await fetch(
"https://www.jma.go.jp/bosai/quake/data/list.json",
{cache:"no-cache"}
);

const data=await res.json();
if(!data.length) return;

const jma=data[0];

/* P2P補助 */
const p2p=await getP2P();

const timeText=formatTime(jma.time);
const publishText=formatTime(jma.tt);

const maxShindo=p2p.maxi || jma.maxi || "";

/* 地震情報 */
latestText=
`【地震情報】
${timeText}
震源地：${jma.anm || ""}
深さ：${jma.dep ? jma.dep+"km":""}
規模：M${jma.mag || ""}

最大震度：${maxShindo}

この地震による津波の心配はありません`;

document.getElementById("quake_box").innerText=latestText;

/* EEW */
const eewBox=document.getElementById("eew_box");

if(jma.maxi && jma.maxi.includes("5")){
eewBox.innerText=
`◤◢◤ 緊急地震速報（警報） ◥◣◥
強い揺れに警戒`;
}
else if(jma.maxi){
eewBox.innerText=
`◤◢◤ 緊急地震速報（予報） ◥◣◥`;
}
else{
eewBox.innerText="緊急地震速報：発表されていません";
}

/* 津波 */
document.getElementById("tsunami_box").innerText=
"【津波情報】\n現在発表されていません";

document.getElementById("update_time").innerText=
new Date().toLocaleString();

}catch{
console.log("取得失敗");
}

}

function copyText(){
navigator.clipboard.writeText(latestText);
alert("コピーしました");
}

setInterval(()=>{

countdown--;

if(countdown<=0){
countdown=30;
loadData();
}

document.getElementById("timer").innerText=countdown;

},1000);

loadData();

</script>

</body>
</html>
