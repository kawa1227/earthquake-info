<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防災情報</title>

<style>
body{
font-family:sans-serif;
margin:0;
padding:10px;
background:#f4f4f4;
}

.block{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
padding:8px 14px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="block">

<h2>防災情報</h2>

次回更新：<span id="timer">30</span>秒<br>
最終更新：<span id="lastUpdate">未更新</span>

<br>
<button onclick="manualUpdate()">更新</button>

<hr>

<h3>緊急地震速報</h3>
<div id="eew_box">発表されていません。</div>

<hr>

<h3>地震情報</h3>
<div id="quake_info">取得中...</div>

<button onclick="copyText()">コピー</button>

<hr>

<h3>津波情報</h3>
<div id="tsunami_info">現在発表されていません。</div>

</div>

<script>

let countdown=30;
let latestText="";

async function loadData(){

try{

const res=await fetch(
"https://www.jma.go.jp/bosai/quake/data/list.json",
{cache:"no-cache"}
);

const data=await res.json();

if(data.length>0){

const q=data[0];

// 地震情報
latestText=
`【地震情報】
${q.time || "○月○日○時○分"}
震源地：${q.anm || "不明"}
深さ：${q.dep ? q.dep+" km":"不明"}
規模：M${q.mag || "不明"}

この地震による津波の心配はありません。`;

document.getElementById("quake_info").innerText=latestText;


// EEW表示
let eewBox=document.getElementById("eew_box");

if(q.maxi && q.maxi.includes("5")){
eewBox.innerText=
`◤◢◤ 緊急地震速報（警報） ◥◣◥
強い揺れに警戒！
対象地域：○○ ○○
気象庁┃${q.time || "--:--"}発表`;
}
else if(q.maxi){
eewBox.innerText=
`◤◢◤ 緊急地震速報（予報） ◥◣◥
震源地：${q.anm || "不明"}
気象庁┃${q.time || "--:--"}発表`;
}
else{
eewBox.innerText="発表されていません。";
}


// 津波情報
document.getElementById("tsunami_info").innerText=
"【津波情報】\n現在発表されていません。";

}

document.getElementById("lastUpdate").innerText=
new Date().toLocaleString();

}catch{

setTimeout(loadData,3000);

}

}

function copyText(){
navigator.clipboard.writeText(latestText);
alert("コピーしました");
}

function manualUpdate(){
countdown=30;
loadData();
}

setInterval(()=>{

countdown--;

if(countdown<=0){
countdown=30;
loadData();
}

document.getElementById("timer").innerText=countdown;

},1000);

loadData();

</script>

</body>
</html>
