<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防災速報 P2P版</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
padding:12px;
}

.box{
background:#222;
padding:15px;
border-radius:12px;
margin-bottom:15px;
white-space:pre-line;
line-height:1.5;
}

.header{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
font-size:16px;
background:#444;
color:white;
border:none;
border-radius:8px;
}

</style>
</head>

<body>

<div class="header">◤ 防災速報 P2P強化版 ◢</div>

次回更新：<span id="timer">30</span>秒<br>
最終更新：<span id="update_time"></span>

<div class="box" id="eew_box">
緊急地震速報：発表されていません
</div>

<div class="box" id="quake_box">
地震情報取得中...
</div>

<div class="box" id="tsunami_box">
津波情報：現在発表されていません
</div>

<button onclick="copyText()">コピー</button>

<script>

let countdown=30;
let latestText="";

/* P2P取得 */
async function getP2P(){

try{

const res=await fetch(
"https://api.p2pquake.net/v2/history?limit=1"
);

const data=await res.json();

if(!data.length) return null;

return data[0];

}catch{
return null;
}

}

function formatTime(t){

if(!t) return "";

const d=new Date(t);

return `${d.getMonth()+1}月${d.getDate()}日 ${d.getHours()}時${d.getMinutes().toString().padStart(2,"0")}分頃`;

}

async function loadData(){

try{

const p2p=await getP2P();
if(!p2p) return;

const timeText=formatTime(p2p.time);

/* 地震情報 */
latestText=
`【地震情報】
${timeText}
震源地：${p2p.hypocenter || ""}
深さ：${p2p.depth ? p2p.depth+"km":""}
規模：M${p2p.mag || ""}
最大震度：${p2p.maxi || ""}

この地震による津波の心配はありません`;

document.getElementById("quake_box").innerText=latestText;

/* EEW表示 */
const eewBox=document.getElementById("eew_box");

if(p2p.maxi && p2p.maxi.includes("5")){
eewBox.innerText=
`◤◢◤ 緊急地震速報（警報） ◥◣◥
強い揺れに警戒`;
}
else if(p2p.maxi){
eewBox.innerText=
"◤◢◤ 緊急地震速報（予報） ◥◣◥";
}
else{
eewBox.innerText="緊急地震速報：発表されていません";
}

/* 津波 */
document.getElementById("tsunami_box").innerText=
p2p.tsunami || "【津波情報】現在発表されていません";

document.getElementById("update_time").innerText=
new Date().toLocaleString();

}catch{
console.log("取得失敗");
}

}

function copyText(){
navigator.clipboard.writeText(latestText);
alert("コピーしました");
}

setInterval(()=>{

countdown--;

if(countdown<=0){
countdown=30;
loadData();
}

document.getElementById("timer").innerText=countdown;

},1000);

loadData();

</script>

</body>
</html>
