<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防災速報</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f0f0f;
color:white;
padding:15px;
}

.box{
background:#1f1f1f;
padding:15px;
border-radius:12px;
margin-bottom:15px;
white-space:pre-line;
}

h2{
margin-top:0;
}

button{
width:100%;
padding:12px;
font-size:16px;
}
</style>
</head>

<body>

<h2>防災速報</h2>

次回更新：<span id="timer">30</span>秒
<br>
最終更新：<span id="update_time"></span>

<div class="box" id="quake_box">
地震情報取得中…
</div>

<div class="box" id="eew_box">
緊急地震速報：発表されていません
</div>

<div class="box" id="tsunami_box">
津波情報：現在発表されていません
</div>

<button onclick="copyText()">コピー</button>

<script>

let countdown=30;
let latestText="";

/* 時刻 */
function formatTime(t){
if(!t) return "";

const d=new Date(t);

return `${d.getMonth()+1}月${d.getDate()}日 ${d.getHours()}時${d.getMinutes().toString().padStart(2,"0")}分頃`;
}

/* P2P取得 */
async function loadData(){

try{

const res=await fetch(
"https://api.p2pquake.net/v2/history?limit=1"
);

const data=await res.json();
if(!data.length) return;

const d=data[0];
const eq=d.earthquake;

/* ★ ここが本体 ★ */

const timeText=formatTime(eq.time);

latestText=
`【地震情報】
${timeText}
震源地：${eq.hypocenter?.name || "不明"}
深さ：${eq.hypocenter?.depth ? eq.hypocenter.depth+"km":"不明"}
規模：M${eq.hypocenter?.magnitude || "不明"}
最大震度：${d.maxScale || "不明"}

この地震による津波の心配はありません`;

document.getElementById("quake_box").innerText=latestText;


/* EEW */
if(d.code===554){
document.getElementById("eew_box").innerText=
"◤◢◤ 緊急地震速報（警報） ◥◣◥";
}
else if(d.code===552){
document.getElementById("eew_box").innerText=
"◤◢◤ 緊急地震速報（予報） ◥◣◥";
}
else{
document.getElementById("eew_box").innerText=
"緊急地震速報：発表されていません";
}


/* 津波 */
document.getElementById("tsunami_box").innerText=
d.tsunami || "【津波情報】現在発表されていません";


document.getElementById("update_time").innerText=
new Date().toLocaleString();

}catch{
document.getElementById("quake_box").innerText="情報取得に失敗";
}

}

function copyText(){
navigator.clipboard.writeText(latestText);
alert("コピーしました");
}

setInterval(()=>{

countdown--;

if(countdown<=0){
countdown=30;
loadData();
}

document.getElementById("timer").innerText=countdown;

},1000);

loadData();

</script>

</body>
</html>
