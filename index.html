<script>

let latestText="";
let countdown=30;

/* 時刻整形 */
function formatTimeFull(t){
if(!t) return "";

try{
const d=new Date(t);

const m=d.getMonth()+1;
const date=d.getDate();
const h=d.getHours();
const min=d.getMinutes().toString().padStart(2,"0");

return `${m}月${date}日 ${h}時${min}分頃`;

}catch{
return "";
}
}

/* P2P地震情報補助取得 */
async function getP2PBackup(){

try{

const res=await fetch(
"https://api.p2pquake.net/v2/history?limit=1"
);

const data=await res.json();

if(!data.length) return "";

const d=data[0];

return {
maxi:d.maxi || ""
};

}catch{
return {};
}

}

async function loadData(){

try{

// ===== 気象庁 =====
const res=await fetch(
"https://www.jma.go.jp/bosai/quake/data/list.json",
{cache:"no-cache"}
);

const data=await res.json();
if(!data.length) return;

const q=data[0];

// ===== P2P補助 =====
const p2p=await getP2PBackup();

// ===== 表示 =====

const timeText=formatTimeFull(q.time);
const publishText=formatTimeFull(q.tt);

latestText=
`【地震情報】
${timeText}
震源地：${q.anm || ""}
深さ：${q.dep ? q.dep+"km":""}
規模：M${q.mag || ""}

最大震度：${p2p.maxi || q.maxi || ""}

この地震による津波の心配はありません。`;

document.getElementById("quake_box").innerText=latestText;


/* EEW */
const eewBox=document.getElementById("eew_box");

if(q.maxi && q.maxi.includes("5")){
eewBox.innerText="◤◢◤ 緊急地震速報（警報） ◥◣◥";
}
else if(q.maxi){
eewBox.innerText="◤◢◤ 緊急地震速報（予報） ◥◣◥";
}
else{
eewBox.innerText="発表されていません。";
}

document.getElementById("update_time").innerText=
new Date().toLocaleString();

}catch{
console.log("取得失敗");
}

}

setInterval(()=>{

countdown--;

if(countdown<=0){
countdown=30;
loadData();
}

document.getElementById("timer").innerText=countdown;

},1000);

loadData();

</script>
