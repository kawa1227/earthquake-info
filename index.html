<script>

let latestText="";

function formatTimeFull(t){
if(!t) return "";

const d=new Date(t);
const month=d.getMonth()+1;
const date=d.getDate();
const h=d.getHours();
const m=d.getMinutes().toString().padStart(2,"0");

return `${month}月${date}日 ${h}時${m}分頃`;
}

async function loadData(){

try{

const res=await fetch(
"https://www.jma.go.jp/bosai/quake/data/list.json",
{cache:"no-cache"}
);

const data=await res.json();
if(!data.length) return;

const q=data[0];

const timeText=formatTimeFull(q.time);

// 地震情報
latestText=
`【地震情報】
${timeText}
${q.anm ? "震源地："+q.anm : ""}
${q.dep ? "深さ："+q.dep+"km" : ""}
${q.mag ? "規模：M"+q.mag : ""}
この地震による津波の心配はありません.`;

document.getElementById("quake_box").innerText=latestText;

}catch{
console.log("取得失敗");
}

}

loadData();

</script>
